# /etc/nginx/sites-available/ssd
# Symlink: sudo ln -s /etc/nginx/sites-available/ssd /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # ganti dengan domain/IP EC2 lo

    # ── Next.js frontend ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── FastAPI backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
    }

    # ── Internal endpoint — JANGAN expose ke publik ───────────────────────
    location /internal/ {
        allow   127.0.0.1;
        deny    all;
        proxy_pass http://127.0.0.1:8000;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "strict-origin-when-cross-origin";
}

# Uncomment kalau sudah punya SSL via certbot:
